name: Build & Publish Android

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install npm dependencies
      run: npm install

    - name: Build web app (Vite)
      run: npm run build

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Add Android platform (Capacitor)
      run: npx cap add android

    - name: Copy app icons into Android res
      run: |
        if [ -d "icons/android-res" ]; then
          cp -r icons/android-res/mipmap-* android/app/src/main/res/
        fi

    - name: Set version code from run number
      run: |
        VERSION_CODE=${{ github.run_number }}
        VERSION_NAME="1.0.${{ github.run_number }}"
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
        sed -i "s/versionCode .*/versionCode $VERSION_CODE/" android/app/build.gradle
        sed -i 's/versionName .*/versionName "'$VERSION_NAME'"/' android/app/build.gradle

    - name: Decode release keystore
      run: |
        printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --ignore-garbage --decode > kct-fitness-release.keystore

    - name: Sync Capacitor (web assets to Android)
      run: npx cap sync android

    - name: Build signed Android App Bundle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew bundleRelease \
          -Pandroid.injected.signing.store.file=${{ github.workspace }}/kct-fitness-release.keystore \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=kct-fitness \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      env:
        GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

    - name: Upload AAB as build artifact
      uses: actions/upload-artifact@v4
      with:
        name: kct-fitness-v${{ env.VERSION_NAME }}.aab
        path: android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 30
